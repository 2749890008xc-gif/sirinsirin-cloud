spring:
  profiles:
    active: dev
  application:
    name: sirinsirin-cloud-gateway
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yml
        group: sirinsirin
        shared-configs:
          - ${spring.application.name}-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}

    gateway:
      routes:
        - id: admin
          #所谓“负载均衡”就是多个服务器都是做相同业务时网关会将请求平均的分配给这几个服务器。
          #但是如果其中有服务器挂掉，此时网关还是会将请求发给这个挂掉的服务器，那么结局必然是报错
          uri: lb://sirinsirin-cloud-admin
          predicates:
            - Path=/admin/**
          filters:
            - StripPrefix=1
            - AdminFilter

        - id: web
          #所谓“负载均衡”就是多个服务器都是做相同业务时网关会将请求平均的分配给这几个服务器。
          #但是如果其中有服务器挂掉，此时网关还是会将请求发给这个挂掉的服务器，那么结局必然是报错
          uri: lb://sirinsirin-cloud-web
          predicates:
            - Path=/web/**
          filters:
            - StripPrefix=1

        - id: resource
          #所谓“负载均衡”就是多个服务器都是做相同业务时网关会将请求平均的分配给这几个服务器。
          #但是如果其中有服务器挂掉，此时网关还是会将请求发给这个挂掉的服务器，那么结局必然是报错
          uri: lb://sirinsirin-cloud-resource
          predicates:
            - Path=/file/**
          filters:
            - StripPrefix=1

        - id: interact
          #所谓“负载均衡”就是多个服务器都是做相同业务时网关会将请求平均的分配给这几个服务器。
          #但是如果其中有服务器挂掉，此时网关还是会将请求发给这个挂掉的服务器，那么结局必然是报错
          uri: lb://sirinsirin-cloud-interact
          predicates:
            - Path=/interact/**
          filters:
            - StripPrefix=1